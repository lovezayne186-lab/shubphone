    <script src="../JS/couplespace/couple-space.js?v=3"></script>
    <script>
        // 情书相关逻辑
        const LETTER_STORAGE_KEY = 'couple_space_letters_v1';
        let letterData = [];
        let letterReplyLoading = false;

        function getLetterParentWindow() {
            try { return window.parent && window.parent !== window ? window.parent : null; } catch (e) { return null; }
        }

        function resolveLetterRoleId() {
            try {
                const linked = localStorage.getItem('couple_has_linked_v1') === 'true';
                const rid = String(localStorage.getItem('couple_linked_role_id_v1') || '').trim();
                if (linked && rid) return rid;
            } catch (e) {}
            return String(localStorage.getItem('currentChatId') || '').trim();
        }

        function buildLetterStorageKey() {
            const rid = resolveLetterRoleId();
            return rid ? `${LETTER_STORAGE_KEY}__${rid}` : LETTER_STORAGE_KEY;
        }

        function formatLetterDate(ts) {
            const date = ts instanceof Date ? ts : new Date(ts || Date.now());
            return `${date.getFullYear()}.${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
        }

        function readLetterPromptMeta() {
            const rid = resolveLetterRoleId();
            let profiles = {};
            let personas = {};
            const pw = getLetterParentWindow();
            try {
                profiles = pw && pw.charProfiles ? pw.charProfiles : JSON.parse(localStorage.getItem('wechat_charProfiles') || '{}');
                personas = pw && pw.userPersonas ? pw.userPersonas : JSON.parse(localStorage.getItem('wechat_userPersonas') || '{}');
            } catch (e) {}
            const p = profiles[rid] || {};
            const u = personas[rid] || {};
            let worldBookPrompt = '';
            try {
                if (pw && typeof pw.buildWorldBookPrompt === 'function' && p.worldbookId) {
                    worldBookPrompt = String(pw.buildWorldBookPrompt(p.worldbookId) || '').trim();
                }
            } catch (e2) {}
            if (!worldBookPrompt) {
                try {
                    const rawBooks = JSON.parse(localStorage.getItem('wechat_worldbooks') || '{}');
                    const ids = Array.isArray(p.worldbookId) ? p.worldbookId : (p.worldbookId ? [p.worldbookId] : []);
                    worldBookPrompt = ids.map((id) => {
                        const book = rawBooks && typeof rawBooks === 'object' ? rawBooks[String(id || '').trim()] : null;
                        if (!book || typeof book !== 'object') return '';
                        const title = String(book.title || '').trim();
                        const content = String(book.content || '').trim();
                        if (!title && !content) return '';
                        return `世界书标题：${title || '未命名'}\n世界书内容：${content || '（无内容）'}`;
                    }).filter(Boolean).join('\n\n');
                } catch (e3) {}
            }
            return {
                roleId: rid,
                roleName: String(p.remark || p.nickName || p.name || 'TA').trim() || 'TA',
                userName: String(u.name || localStorage.getItem('user_name') || '你').trim() || '你',
                rolePrompt: String(p.desc || p.persona || p.style || '').trim(),
                userBackground: String(u.setting || u.persona || u.background || '').trim(),
                worldBookPrompt: String(worldBookPrompt || '').trim()
            };
        }

        function readLetterChatHistory(roleId) {
            const rid = String(roleId || '').trim();
            if (!rid) return [];
            const pw = getLetterParentWindow();
            try {
                if (pw && pw.chatData && Array.isArray(pw.chatData[rid])) return pw.chatData[rid].slice();
            } catch (e) {}
            try {
                const raw = localStorage.getItem('wechat_chatData') || '{}';
                const parsed = JSON.parse(raw);
                return parsed && Array.isArray(parsed[rid]) ? parsed[rid].slice() : [];
            } catch (e2) {
                return [];
            }
        }

        function buildLetterShortMemory(meta) {
            const history = readLetterChatHistory(meta.roleId);
            const lines = [];
            for (let i = 0; i < history.length; i++) {
                const msg = history[i];
                if (!msg || typeof msg !== 'object') continue;
                const role = String(msg.role || '').trim();
                if (role !== 'me' && role !== 'ai') continue;
                const content = String(msg.content || '').replace(/\s+/g, ' ').trim();
                if (!content) continue;
                lines.push(`${role === 'me' ? meta.userName : meta.roleName}：${content}`);
            }
            if (!lines.length) {
                return `${meta.roleName}和${meta.userName}最近聊天不多，整体氛围偏日常、温柔、亲密。`;
            }
            return lines.slice(-24).join('\n');
        }

        function buildLetterReplyPrompts(targetLetter) {
            const meta = readLetterPromptMeta();
            const shortMemory = buildLetterShortMemory(meta);
            const letterText = String(targetLetter && targetLetter.text ? targetLetter.text : '').trim();
            const systemPrompt = [
                '[[PROMPT_CLASS:ROLE_LITE]]',
                '[[SCENE:COUPLE_LETTER_REPLY]]',
                `你和${meta.userName}是恋人关系，现在要求你根据${meta.userName}写的信件来回复一封情书。`,
                '【角色身份】',
                `你现在不是助手，你是${meta.roleName}。`,
                meta.rolePrompt ? `你的人设与相处气质：${meta.rolePrompt}` : '',
                meta.worldBookPrompt ? `【世界书背景】\n${meta.worldBookPrompt}` : '',
                '',
                '【用户身份】',
                `${meta.userName}是你的恋人。`,
                meta.userBackground ? `关于${meta.userName}的背景：${meta.userBackground}` : '',
                '',
                '【当前页面场景】',
                '当前页面是情侣空间里的“情书”页。',
                `现在${meta.userName}刚刚给你写来一封信，你要正式回一封情书。`,
                '',
                '【写作要求】',
                '这封回复必须像一封正式的信件，而不是聊天消息。',
                '文笔可以参考沈从文、朱生豪这类温柔、真挚、含蓄又有画面感的书信风格，但不要照抄任何现成句子。',
                '必须包含：称呼、正文、署名、日期。',
                '正文要围绕对方这封来信的内容认真回应，既要回应情绪，也要回应细节。',
                '必须是中文。',
                '总字数不得少于 200 字，500 字左右最佳。',
                '不要输出解释、不要输出 markdown、不要输出代码块、不要写成诗歌条目。'
            ].filter(Boolean).join('\n');

            const userPrompt = [
                '【近期聊天记录】',
                shortMemory,
                '',
                '【刚刚收到的情书】',
                letterText,
                '',
                '【补充提醒】',
                `请以${meta.roleName}的身份回信，既保留恋人之间的亲密，又要保持书信体的正式与完整。`
            ].join('\n');

            return { meta, systemPrompt, userPrompt };
        }

        function logCoupleLetterPromptDebug(tag, systemPrompt, userPrompt) {
            const payload = {
                page: 'couple-space-letter',
                tag: String(tag || '情书回复').trim() || '情书回复',
                timestamp: Date.now(),
                systemPrompt: String(systemPrompt || ''),
                userPrompt: String(userPrompt || '')
            };
            try {
                window.__couplePromptDebugHistory = Array.isArray(window.__couplePromptDebugHistory) ? window.__couplePromptDebugHistory : [];
                window.__couplePromptDebugHistory.unshift(payload);
                window.__couplePromptDebugHistory = window.__couplePromptDebugHistory.slice(0, 30);
                window.__lastCoupleLetterPromptDebug = payload;
            } catch (e) {}
            try {
                console.group(`[AI Prompt][情侣空间情书] ${payload.tag}`);
                console.log('=== SYSTEM PROMPT START ===\n' + payload.systemPrompt + '\n=== SYSTEM PROMPT END ===');
                console.log('=== USER PROMPT START ===\n' + payload.userPrompt + '\n=== USER PROMPT END ===');
                console.groupEnd();
            } catch (e2) {
                console.log('[AI Prompt][情侣空间情书]', payload);
            }
        }

        function readLetterState() {
            try {
                const raw = localStorage.getItem(buildLetterStorageKey());
                const parsed = raw ? JSON.parse(raw) : null;
                return parsed && Array.isArray(parsed.items) ? parsed.items : [];
            } catch (e) {
                return [];
            }
        }

        function writeLetterState() {
            try {
                localStorage.setItem(buildLetterStorageKey(), JSON.stringify({ items: letterData }));
            } catch (e) {}
        }

        function getLatestPendingUserLetter() {
            for (let i = letterData.length - 1; i >= 0; i--) {
                const item = letterData[i];
                if (!item || item.side !== 'right') continue;
                if (item.replied) continue;
                const text = String(item.text || '').trim();
                if (!text) continue;
                return item;
            }
            return null;
        }

        function refreshLetterReplyTrigger() {
            const trigger = document.getElementById('letter-reply-trigger');
            if (!trigger) return;
            const meta = readLetterPromptMeta();
            const pending = getLatestPendingUserLetter();
            if (letterReplyLoading) {
                trigger.textContent = `${meta.roleName}正在为你写回信...`;
            } else if (pending) {
                trigger.textContent = `点击收下${meta.roleName}的回信`;
            } else if (letterData.length > 0) {
                trigger.textContent = `${meta.roleName}在远方酝酿信笺...`;
            } else {
                trigger.textContent = `${meta.roleName}在远方等你来信...`;
            }
        }

        function renderLetterTimeline() {
            const container = document.getElementById('letter-timeline');
            if (!container) return;
            
            // Keep the center line
            container.innerHTML = '<div class="letter-center-line"></div>';
            
            letterData.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.className = `letter-card-wrapper ${item.side}`;

                const safeText = String(item.text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                wrapper.innerHTML = `
                    <div class="letter-dot"></div>
                    <div class="letter-stamp" onclick="openLetterDetail('${item.id}')">
                        <div class="letter-stamp-content">
                            <div class="letter-date">${item.date}</div>
                            <div class="letter-text">${safeText}</div>
                            <div class="letter-bottom-icon">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d48fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(wrapper);
            });
            refreshLetterReplyTrigger();
        }

        function openLetterDetail(id) {
            const target = letterData.find(item => String(item.id) === String(id));
            if (!target) return;
            
            const modal = document.getElementById('letter-detail-modal');
            const dateEl = document.getElementById('letter-detail-date');
            const textEl = document.getElementById('letter-detail-text');
            
            if (modal && dateEl && textEl) {
                dateEl.textContent = target.date;
                textEl.textContent = target.text;
                modal.classList.add('show');
            }
        }

        function closeLetterDetail() {
            const modal = document.getElementById('letter-detail-modal');
            if (modal) {
                modal.classList.remove('show');
            }
        }

        function openLetterInput() {
            const modal = document.getElementById('letter-input-modal');
            if (modal) {
                modal.hidden = false;
                document.getElementById('letter-textarea').value = '';
                document.getElementById('letter-textarea').focus();
            }
        }

        function closeLetterInput() {
            const modal = document.getElementById('letter-input-modal');
            if (modal) {
                modal.hidden = true;
            }
        }

        function submitLetter() {
            const text = document.getElementById('letter-textarea').value.trim();
            if (!text) return;
            
            const now = new Date();
            const dateStr = formatLetterDate(now);
            
            letterData.push({
                id: Date.now(),
                side: 'right',
                date: dateStr,
                text: text,
                isAi: false,
                replied: false,
                createdAt: now.getTime()
            });
            
            closeLetterInput();
            writeLetterState();
            renderLetterTimeline();
            
            // Scroll to bottom
            setTimeout(() => {
                const scrollEl = document.querySelector('.main-content');
                if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
            }, 100);
        }

        function sanitizeLetterReplyText(text) {
            let clean = String(text || '').replace(/```(?:text|markdown)?/ig, '').replace(/```/g, '').trim();
            clean = clean.replace(/^情书回复[:：]\s*/i, '').trim();
            return clean;
        }

        function resolveLetterCallAI() {
            const pw = getLetterParentWindow();
            if (pw && typeof pw.callAI === 'function') return pw.callAI;
            if (typeof window.callAI === 'function') return window.callAI;
            return null;
        }

        async function triggerLetterReply() {
            if (letterReplyLoading) return;
            const pendingLetter = getLatestPendingUserLetter();
            if (!pendingLetter) {
                alert('先写一封情书，再邀请对方回信吧。');
                return;
            }
            const callAI = resolveLetterCallAI();
            if (!callAI) {
                alert('AI 接口未初始化');
                return;
            }
            const prompts = buildLetterReplyPrompts(pendingLetter);
            logCoupleLetterPromptDebug('情书回复', prompts.systemPrompt, prompts.userPrompt);
            letterReplyLoading = true;
            refreshLetterReplyTrigger();
            try {
                const raw = await new Promise((resolve, reject) => {
                    callAI(
                        prompts.systemPrompt,
                        [],
                        { text: prompts.userPrompt },
                        (text) => resolve(String(text || '')),
                        (err) => reject(new Error(String(err || '请求失败')))
                    );
                });
                const replyText = sanitizeLetterReplyText(raw);
                if (!replyText) throw new Error('未生成有效回信');
                if (replyText.replace(/\s+/g, '').length < 200) throw new Error('生成的回信过短，请稍后重试');
                const now = new Date();
                letterData.push({
                    id: Date.now(),
                    side: 'left',
                    date: formatLetterDate(now),
                    text: replyText,
                    isAi: true,
                    createdAt: now.getTime(),
                    replyTo: pendingLetter.id
                });
                pendingLetter.replied = true;
                writeLetterState();
                renderLetterTimeline();
                setTimeout(() => {
                    const scrollEl = document.querySelector('.main-content');
                    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
                }, 100);
            } catch (e) {
                console.error('情书回复生成失败', e);
                alert(`生成失败：${e && e.message ? e.message : '请稍后再试'}`);
            } finally {
                letterReplyLoading = false;
                refreshLetterReplyTrigger();
            }
        }

        // Initialize when ready
        document.addEventListener('DOMContentLoaded', () => {
            letterData = readLetterState();
            renderLetterTimeline();
        });
    </script>
</body>
</html>
