<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>恋爱相册</title>
    <script src="https://unpkg.com/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --accent-color: #ff8fb1;
            --text-dark: #333;
            --text-gray: #999;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: calc(env(safe-area-inset-top, 40px) + 74px);
            padding-bottom: 110px;
        }
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(env(safe-area-inset-top, 40px) + 58px);
            padding-top: env(safe-area-inset-top, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            z-index: 100;
        }
        .back-btn {
            position: absolute;
            left: 18px;
            bottom: 14px;
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 300;
        }
        .tabs {
            display: flex;
            gap: 30px;
            position: relative;
            bottom: -4px;
        }
        .tab {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-gray);
            cursor: pointer;
            position: relative;
            padding-bottom: 8px;
            transition: all 0.3s ease;
        }
        .tab.active {
            font-weight: 600;
            color: var(--text-dark);
        }
        .tab-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 4px;
            height: 4px;
            background-color: var(--accent-color);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(14px);
        }
        .content-area {
            padding: 18px 14px 14px;
            display: none;
            animation: fadeIn 0.35s ease;
        }
        .content-area.active {
            display: grid;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #view-mine {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .polaroid-card {
            border: none;
            width: 100%;
            background: #fff;
            border-radius: 8px;
            padding: 7px 7px 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            cursor: pointer;
            text-align: left;
            position: relative;
        }
        .polaroid-media {
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            background: #f4f4f4;
        }
        .polaroid-media.ratio-square {
            aspect-ratio: 1 / 1;
        }
        .polaroid-media.ratio-4-3 {
            aspect-ratio: 4 / 3;
        }
        .polaroid-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .polaroid-date-badge {
            position: absolute;
            right: 6px;
            bottom: 6px;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            border-radius: 10px;
            padding: 2px 7px;
            font-size: 10px;
            line-height: 1.2;
        }
        .polaroid-caption {
            margin-top: 7px;
            font-size: 11px;
            color: #8d8d8d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #view-theirs {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .line-art-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 1px solid #efefef;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
        }
        .select-badge {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.94);
            border: 1px solid rgba(0,0,0,0.12);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            z-index: 3;
        }
        .is-selectable .select-badge {
            display: inline-flex;
        }
        .is-selected {
            box-shadow: 0 0 0 2px rgba(255, 143, 177, 0.92), 0 4px 20px rgba(0,0,0,0.03);
        }
        .is-selected .select-badge {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }
        .line-art-icon {
            width: 28px;
            height: 28px;
            stroke: #333;
            stroke-width: 1.2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .line-art-label {
            font-size: 11px;
            color: #666;
            text-align: center;
            line-height: 1.25;
            width: 100%;
            white-space: normal;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 2.75em;
        }
        .line-art-date {
            position: absolute;
            right: 8px;
            bottom: 8px;
            color: #111;
            font-size: 10px;
            font-weight: 500;
        }
        .fab {
            position: fixed;
            right: 16px;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            background: var(--accent-color);
            color: #fff;
            box-shadow: 0 10px 26px rgba(255, 143, 177, 0.46);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 120;
            transition: all 0.24s ease;
        }
        .fab.theirs-mode {
            width: 110px;
            border-radius: 30px;
            padding: 0 14px;
        }
        .fab:active {
            transform: scale(0.94);
        }
        .fab.loading {
            pointer-events: none;
        }
        .fab-icon {
            font-size: 28px;
            font-weight: 300;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            transition: opacity 0.22s ease;
        }
        .fab.theirs-mode .fab-icon {
            font-size: 17px;
            font-weight: 600;
        }
        .fab .loader {
            display: none;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
        }
        .fab.loading .fab-icon {
            opacity: 0;
        }
        .fab.loading .loader {
            display: block;
        }
        .fab.hidden-fab {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .selection-bar {
            position: fixed;
            left: 14px;
            right: 14px;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
            z-index: 140;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .selection-count {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            white-space: nowrap;
        }
        .selection-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .selection-btn {
            border: none;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            background: #f3f4f6;
            color: #333;
        }
        .selection-btn.danger {
            background: rgba(255, 106, 136, 0.12);
            color: #d44c6b;
        }
        .modal-overlay, .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 220;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease;
        }
        .modal-overlay.show, .detail-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            max-width: 86vw;
            text-align: center;
            padding: 24px;
        }
        .typewriter-text {
            font-size: 16px;
            color: var(--text-dark);
            line-height: 1.7;
            border-right: 2px solid transparent;
            white-space: pre-wrap;
            word-break: break-word;
            overflow: visible;
            display: block;
            width: min(86vw, 320px);
            max-width: 100%;
            min-height: 1.7em;
            text-align: left;
            margin: 0 auto;
        }
        .typewriter-text.typing {
            border-right-color: var(--text-dark);
            animation: blink .75s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--text-dark); }
        }
        .detail-sheet {
            width: min(92vw, 430px);
            max-height: 88vh;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 12px 34px rgba(0,0,0,0.08);
            padding: 14px;
            overflow: auto;
        }
        .detail-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .detail-title {
            font-size: 15px;
            font-weight: 600;
        }
        .detail-close {
            border: none;
            background: #f5f5f5;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
        }
        .detail-image {
            width: 100%;
            border-radius: 8px;
            display: block;
            margin-bottom: 10px;
        }
        .detail-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        .detail-comment {
            font-size: 14px;
            color: #333;
            line-height: 1.65;
            background: #fafafa;
            border-radius: 8px;
            padding: 10px;
        }
        .detail-mood {
            font-size: 14px;
            color: #555;
            line-height: 1.65;
            margin-bottom: 12px;
            font-style: italic;
        }
        .detail-ai-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            border: 1px solid #efefef;
            border-radius: 8px;
            background: #fff;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .detail-ai-btn:active {
            background: #f8f8f8;
            transform: scale(0.98);
        }
        .detail-ai-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }
        .empty-tip {
            font-size: 12px;
            color: #a0a0a0;
            grid-column: 1 / -1;
            padding: 24px 2px 12px;
        }
        .hidden {
            display: none !important;
        }

        /* 增加心情输入弹窗样式 */
        .mood-input-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 250;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease;
        }
        .mood-input-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .mood-input-card {
            width: min(86vw, 360px);
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .mood-input-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }
        .mood-input-textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            resize: none;
            outline: none;
            background: #fafafa;
            font-family: inherit;
        }
        .mood-input-textarea:focus {
            border-color: var(--accent-color);
            background: #fff;
        }
        .mood-input-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }
        .mood-input-btn {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .mood-input-btn.cancel {
            background: #f0f0f0;
            color: #666;
        }
        .mood-input-btn.confirm {
            background: var(--accent-color);
            color: #fff;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="javascript:history.back()" class="back-btn">＜</a>
        <div class="tabs">
            <div class="tab active" data-target="view-mine">我的</div>
            <div class="tab" data-target="view-theirs">对方的</div>
            <div class="tab-indicator" id="tab-indicator"></div>
        </div>
    </nav>
    <main>
        <div id="view-mine" class="content-area active"></div>
        <div id="view-theirs" class="content-area"></div>
    </main>
    <button class="fab" id="fab-btn" type="button">
        <span class="fab-icon" id="fab-icon">+</span>
        <span class="loader"></span>
    </button>
    <div class="selection-bar hidden" id="selection-bar">
        <div class="selection-count" id="selection-count">已选 0 项</div>
        <div class="selection-actions">
            <button class="selection-btn" id="selection-select-all-btn" type="button">全选</button>
            <button class="selection-btn danger" id="selection-delete-btn" type="button">删除</button>
            <button class="selection-btn" id="selection-cancel-btn" type="button">取消</button>
        </div>
    </div>
    <input id="mine-upload-input" class="hidden" type="file" accept="image/*" multiple>
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="typewriter-text" id="modal-text"></div>
        </div>
    </div>
    <div class="detail-overlay" id="detail-overlay">
        <div class="detail-sheet">
            <div class="detail-top">
                <div class="detail-title">照片详情</div>
                <button class="detail-close" id="detail-close" type="button">×</button>
            </div>
            <img id="detail-image" class="detail-image" alt="detail">
            <div id="detail-date" class="detail-date"></div>
            <div id="detail-mood" class="detail-mood" style="display: none;"></div>
            <div id="detail-comment" class="detail-comment"></div>
            <button id="detail-ai-btn" class="detail-ai-btn" type="button">✨ 让AI评价这张照片</button>
        </div>
    </div>
    <div class="mood-input-overlay" id="mood-input-overlay">
        <div class="mood-input-card">
            <div class="mood-input-title">记录当下的心情</div>
            <textarea id="mood-input-text" class="mood-input-textarea" placeholder="写下这一刻的想法或心情..."></textarea>
            <div class="mood-input-actions">
                <button id="mood-input-cancel" class="mood-input-btn cancel" type="button">跳过</button>
                <button id="mood-input-confirm" class="mood-input-btn confirm" type="button">保存</button>
            </div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = 'couple_album_state_v5';
        const STORAGE_ROLE_KEY_SEP = '__roleId__';
        const tabs = document.querySelectorAll('.tab');
        const indicator = document.getElementById('tab-indicator');
        const mineView = document.getElementById('view-mine');
        const theirsView = document.getElementById('view-theirs');
        const fabBtn = document.getElementById('fab-btn');
        const fabIcon = document.getElementById('fab-icon');
        const uploadInput = document.getElementById('mine-upload-input');
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-text');
        const detailOverlay = document.getElementById('detail-overlay');
        const detailCloseBtn = document.getElementById('detail-close');
        const detailImageEl = document.getElementById('detail-image');
        const detailDateEl = document.getElementById('detail-date');
        const detailMoodEl = document.getElementById('detail-mood');
        const detailCommentEl = document.getElementById('detail-comment');
        const detailAiBtn = document.getElementById('detail-ai-btn');
        const selectionBar = document.getElementById('selection-bar');
        const selectionCountEl = document.getElementById('selection-count');
        const selectionSelectAllBtn = document.getElementById('selection-select-all-btn');
        const selectionDeleteBtn = document.getElementById('selection-delete-btn');
        const selectionCancelBtn = document.getElementById('selection-cancel-btn');
        const moodInputOverlay = document.getElementById('mood-input-overlay');
        const moodInputText = document.getElementById('mood-input-text');
        const moodInputCancel = document.getElementById('mood-input-cancel');
        const moodInputConfirm = document.getElementById('mood-input-confirm');
        const state = { minePhotos: [], theirCards: [] };
        let currentTab = 'view-mine';
        let currentDetailId = null;
        let pendingUploadPhotos = [];
        let selectionMode = false;
        let selectionTab = '';
        let selectionIds = new Set();
        let longPressTimer = null;
        let longPressTriggered = false;
        let pressStartX = 0;
        let pressStartY = 0;
        let modalTypingTimer = null;
        let sessionRoleId = '';

        function getPointFromEvent(event) {
            const touch = event && event.touches && event.touches[0]
                ? event.touches[0]
                : event && event.changedTouches && event.changedTouches[0]
                    ? event.changedTouches[0]
                    : event;
            return {
                x: Number(touch && touch.clientX || 0),
                y: Number(touch && touch.clientY || 0)
            };
        }

        function getStorageEngine() {
            try {
                if (window.localforage && typeof window.localforage.getItem === 'function' && typeof window.localforage.setItem === 'function') {
                    return window.localforage;
                }
            } catch (e) {}
            return null;
        }

        function getParentWindow() {
            try {
                return window.parent && window.parent !== window ? window.parent : null;
            } catch (e) {
                return null;
            }
        }

        function getCoupleLinkStateSafe() {
            const parentWin = getParentWindow();
            try {
                if (typeof window.getCoupleLinkState === 'function') {
                    const link = window.getCoupleLinkState();
                    if (link && link.hasCoupleLinked && link.roleId) {
                        return { hasCoupleLinked: true, roleId: String(link.roleId || '').trim() };
                    }
                }
            } catch (e) {}
            try {
                if (parentWin && typeof parentWin.getCoupleLinkState === 'function') {
                    const link = parentWin.getCoupleLinkState();
                    if (link && link.hasCoupleLinked && link.roleId) {
                        return { hasCoupleLinked: true, roleId: String(link.roleId || '').trim() };
                    }
                }
            } catch (e2) {}
            try {
                const has = localStorage.getItem('couple_has_linked_v1') === 'true';
                const roleId = String(localStorage.getItem('couple_linked_role_id_v1') || '').trim();
                if (has && roleId) {
                    return { hasCoupleLinked: true, roleId: roleId };
                }
            } catch (e3) {}
            return { hasCoupleLinked: false, roleId: '' };
        }

        function buildAlbumStorageKey(roleId) {
            const rid = String(roleId || '').trim();
            return rid ? `${STORAGE_KEY}${STORAGE_ROLE_KEY_SEP}${rid}` : STORAGE_KEY;
        }

        function getCurrentRoleId() {
            const link = getCoupleLinkStateSafe();
            if (link && link.hasCoupleLinked && link.roleId) {
                return String(link.roleId || '').trim();
            }
            let roleId = '';
            try {
                const parentWin = getParentWindow();
                if (parentWin) {
                    roleId = String(parentWin.currentChatRole || '').trim();
                    if (roleId) return roleId;
                }
            } catch (e) {}
            roleId = String(window.currentChatRole || '').trim();
            if (roleId) return roleId;
            try {
                roleId = String(localStorage.getItem('currentChatId') || '').trim();
                if (roleId) return roleId;
            } catch (e2) {}
            return '';
        }

        function ensureSessionRoleId(forceRefresh) {
            const nextRoleId = getCurrentRoleId();
            if (forceRefresh || !sessionRoleId || (nextRoleId && nextRoleId !== sessionRoleId)) {
                sessionRoleId = nextRoleId;
            }
            return sessionRoleId;
        }

        async function tryReadScopedAlbumState(storageKey) {
            const lf = getStorageEngine();
            if (lf) {
                try {
                    const parsed = await lf.getItem(storageKey);
                    if (parsed && typeof parsed === 'object') {
                        const minePhotos = Array.isArray(parsed.minePhotos) ? parsed.minePhotos : [];
                        const theirCards = Array.isArray(parsed.theirCards) ? parsed.theirCards : [];
                        return { minePhotos, theirCards };
                    }
                } catch (e) {}
            }
            try {
                const raw = localStorage.getItem(storageKey) || '';
                const parsed = raw ? JSON.parse(raw) : null;
                if (parsed && typeof parsed === 'object') {
                    const minePhotos = Array.isArray(parsed.minePhotos) ? parsed.minePhotos : [];
                    const theirCards = Array.isArray(parsed.theirCards) ? parsed.theirCards : [];
                    return { minePhotos, theirCards };
                }
            } catch (e2) {}
            return null;
        }

        async function migrateLegacyAlbumStateIfNeeded(storageKey) {
            if (!storageKey || storageKey === STORAGE_KEY) return null;
            const existing = await tryReadScopedAlbumState(storageKey);
            if (existing) return existing;
            const lf = getStorageEngine();
            if (lf) {
                try {
                    const legacy = await lf.getItem(STORAGE_KEY);
                    if (legacy && typeof legacy === 'object') {
                        await lf.setItem(storageKey, legacy);
                        try { await lf.removeItem(STORAGE_KEY); } catch (e0) {}
                        return {
                            minePhotos: Array.isArray(legacy.minePhotos) ? legacy.minePhotos : [],
                            theirCards: Array.isArray(legacy.theirCards) ? legacy.theirCards : []
                        };
                    }
                } catch (e) {}
            }
            try {
                const raw = localStorage.getItem(STORAGE_KEY) || '';
                const parsed = raw ? JSON.parse(raw) : null;
                if (parsed && typeof parsed === 'object') {
                    localStorage.setItem(storageKey, JSON.stringify(parsed));
                    try { localStorage.removeItem(STORAGE_KEY); } catch (e1) {}
                    return {
                        minePhotos: Array.isArray(parsed.minePhotos) ? parsed.minePhotos : [],
                        theirCards: Array.isArray(parsed.theirCards) ? parsed.theirCards : []
                    };
                }
            } catch (e2) {}
            return null;
        }

        async function readState() {
            const roleId = ensureSessionRoleId(false);
            const storageKey = buildAlbumStorageKey(roleId);
            const scoped = await tryReadScopedAlbumState(storageKey);
            if (scoped) return scoped;
            const migrated = await migrateLegacyAlbumStateIfNeeded(storageKey);
            if (migrated) return migrated;
            return { minePhotos: [], theirCards: [] };
        }

        async function saveState() {
            const roleId = ensureSessionRoleId(false);
            const storageKey = buildAlbumStorageKey(roleId);
            const payload = {
                minePhotos: Array.isArray(state.minePhotos) ? state.minePhotos : [],
                theirCards: Array.isArray(state.theirCards) ? state.theirCards : [],
            };
            const lf = getStorageEngine();
            if (lf) {
                try {
                    await lf.setItem(storageKey, payload);
                    return true;
                } catch (e) {}
            }
            try {
                localStorage.setItem(storageKey, JSON.stringify(payload));
                return true;
            } catch (e2) {
                return false;
            }
        }

        function clearLongPressTimer() {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;

        function bindLongPress(container, attrName) {
            if (!container) return;
            const findCard = function (target) {
                return target && target.closest ? target.closest('[' + attrName + ']') : null;
            };
            const start = function (event) {
                const card = findCard(event.target);
                if (!card) return;
                const id = String(card.getAttribute(attrName) || '').trim();
                if (!id) return;
                clearLongPressTimer();
                longPressTriggered = false;
                const point = getPointFromEvent(event);
                pressStartX = point.x;
                pressStartY = point.y;
                longPressTimer = setTimeout(function () {
                    longPressTriggered = true;
                    enterSelectionMode(currentTab, id);
                }, 520);
            };
            const cancel = function () {
                clearLongPressTimer();
            };
            const move = function (event) {
                if (!longPressTimer) return;
                const point = getPointFromEvent(event);
                const dx = Math.abs(point.x - pressStartX);
                const dy = Math.abs(point.y - pressStartY);
                if (dx > 12 || dy > 12) {
                    clearLongPressTimer();
                }
            };
            container.addEventListener('touchstart', start, { passive: true });
            container.addEventListener('mousedown', start);
            container.addEventListener('touchmove', move, { passive: true });
            container.addEventListener('mousemove', move);
            container.addEventListener('touchend', cancel);
            container.addEventListener('touchcancel', cancel);
            container.addEventListener('mouseup', cancel);
            container.addEventListener('mouseleave', cancel);
            container.addEventListener('contextmenu', function (event) {
                const card = findCard(event.target);
                if (!card) return;
                const id = String(card.getAttribute(attrName) || '').trim();
                if (!id) return;
                event.preventDefault();
                longPressTriggered = true;
                enterSelectionMode(currentTab, id);
            });
            container.addEventListener('click', function (event) {
                const card = findCard(event.target);
                if (!card) return;
                const id = String(card.getAttribute(attrName) || '').trim();
                if (!id) return;
                if (longPressTriggered) {
                    longPressTriggered = false;
                    event.preventDefault();
                    return;
                }
                if (selectionMode) {
                    event.preventDefault();
                    if (selectionTab && selectionTab !== currentTab) return;
                    toggleSelection(id);
                }
            });
        }

        async function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result || ''));
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handleMineUpload(files) {
            const list = Array.from(files || []).filter((f) => f && f.type && f.type.startsWith('image/'));
            if (!list.length) return;
            
            pendingUploadPhotos = [];
            for (let i = 0; i < list.length; i++) {
                const src = await fileToDataUrl(list[i]);
                const now = Date.now();
                pendingUploadPhotos.push({
                    id: `mine_${now}_${i}_${Math.random().toString(36).slice(2, 8)}`,
                    src,
                    date: formatDate(now),
                    createdAt: now + i,
                    ratio: '1:1',
                    comment: '',
                    mood: '',
                });
            }
            
            if (pendingUploadPhotos.length > 0) {
                moodInputText.value = '';
                moodInputOverlay.classList.add('show');
                moodInputText.focus();
            }
        }
        
        async function finalizeUpload(moodText) {
            for (const photo of pendingUploadPhotos) {
                photo.mood = moodText;
                state.minePhotos.push(photo);
            }
            pendingUploadPhotos = [];
            moodInputOverlay.classList.remove('show');
            renderMine();
            await saveState();
        }

                `${headline}`,
                `原因：${reason}`,
                extra || '这次失败可能来自接口请求异常、模型返回为空、上下文中混入了无关错误消息，或返回内容不满足 JSON/长度要求。'
            ].filter(Boolean).join('\n\n');
        }

        async function requestAlbumGalleryDescriptions(prompts) {
            const reply = await askAi(prompts.systemPrompt, prompts.userPrompt, '', '对方相册生成-主请求');
            logAlbumResponseDebug('对方相册生成-主请求', reply, { stage: 'main' });
            const normalized = extractPhotoDescriptions(reply).slice(0, 4).map(normalizePhotoDescription).filter(Boolean);
            if (normalized.length < 4) {
                throw new Error('模型返回的内容无法稳定解析成 4 条有效的相册画面描述。');
            }
            return normalized;
        }

        async function retryAlbumGalleryDescriptions(prompts) {
            const reply = await askAi(prompts.retryPrompt, prompts.userPrompt, '', '对方相册生成-重试请求');
            logAlbumResponseDebug('对方相册生成-重试请求', reply, { stage: 'retry' });
            const normalized = extractPhotoDescriptions(reply).slice(0, 4).map(normalizePhotoDescription).filter(Boolean);
            if (normalized.length < 4) {
                throw new Error('重试后返回内容仍然不是有效的 4 条 JSON 数组画面描述。');
            }
            return normalized;
        }

        async function requestAlbumCommentText(prompts, target, isRetry) {
            const reply = await askAi(
                isRetry ? prompts.retryPrompt : prompts.systemPrompt,
                prompts.userPrompt,
                target.src,
                isRetry ? '照片评论-重试请求' : '照片评论-主请求'
            );
            logAlbumResponseDebug(isRetry ? '照片评论-重试请求' : '照片评论-主请求', reply, {
                stage: isRetry ? 'retry' : 'main',
                hasImage: true
            });
            const newComment = sanitizeAlbumComment(reply);
            if (!newComment) {
                throw new Error(isRetry
                    ? '重试后返回内容仍然不是有效的照片评论。'
                    : '模型返回的评论为空，或内容不符合照片评论要求。');
            }
            return newComment;
        }

        function extractJsonArray(text) {
            const raw = String(text || '').trim();
            if (!raw) return null;
            const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
            const candidate = fenced && fenced[1] ? fenced[1].trim() : raw;
            const start = candidate.indexOf('[');
            const end = candidate.lastIndexOf(']');
            if (start === -1 || end === -1 || end <= start) return null;
            const slice = candidate.slice(start, end + 1);
            try {
                const parsed = JSON.parse(slice);
                return Array.isArray(parsed) ? parsed : null;
            } catch (e) {
                return null;
            }
        }

        function extractJsonObject(text) {
            const raw = String(text || '').trim();
            if (!raw) return null;
            const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
            const candidate = fenced && fenced[1] ? fenced[1].trim() : raw;
            const start = candidate.indexOf('{');
            const end = candidate.lastIndexOf('}');
            if (start === -1 || end === -1 || end <= start) return null;
            try {
                const parsed = JSON.parse(candidate.slice(start, end + 1));
                return parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : null;
            } catch (e) {
                return null;
            }
        }

        function pickAiTextFromObject(obj) {
            if (!obj || typeof obj !== 'object') return '';
            const keys = ['comment', 'reply', 'content', 'text', 'message', 'caption', 'description'];
            for (let i = 0; i < keys.length; i++) {
                const value = obj[keys[i]];
                if (typeof value === 'string' && value.trim()) return value.trim();
            }
            return '';
        }

        function parseAiText(text) {
            const raw = String(text || '').trim();
            if (!raw) return '';
            const obj = extractJsonObject(raw);
            const objectText = pickAiTextFromObject(obj);
            if (objectText) return objectText;
            let candidate = raw;
            candidate = candidate.replace(/<think[\s\S]*?<\/think>/gi, ' ');
            candidate = candidate.replace(/<thinking[\s\S]*?<\/thinking>/gi, ' ');
            candidate = candidate.replace(/\[\[[\s\S]*?\]\]/g, ' ');
            const fenced = candidate.match(/```(?:json)?\s*([\s\S]*?)```/i);
            if (fenced && fenced[1]) {
                candidate = fenced[1].trim();
            }
            if (candidate.indexOf('|||') !== -1) {
                const parts = candidate.split('|||').map(function (part) { return String(part || '').trim(); }).filter(Boolean);
                if (parts.length) candidate = parts[parts.length - 1];
            }
            const lines = candidate
                .split(/\r?\n+/)
                .map(function (line) { return String(line || '').trim(); })
                .filter(Boolean)
                .filter(function (line) {
                    return !/^(思考|分析|推理|状态|备注|说明|系统|thought|thinking|reasoning)\s*[:：]/i.test(line);
                });
            candidate = lines.join(' ').trim();
            candidate = candidate.replace(/^["']|["']$/g, '').trim();
            candidate = candidate.replace(/^(最终回答|回答|输出|评论)\s*[:：]\s*/i, '').trim();
            candidate = candidate.replace(/\s+/g, ' ').trim();
            return candidate || '';
        }

        function sanitizeAlbumComment(text) {
            let clean = parseAiText(text);
            if (!clean) return '';
            clean = clean.replace(/^(我先|让我先|我需要|我来|我会)(想|看看|分析|描述|评价)[^，。；]*[，。；]\s*/g, '').trim();
            clean = clean.replace(/(当前)?状态\s*[:：][^，。；]*[，。；]?/gi, '').trim();
            clean = clean.replace(/(思路|分析|推理)\s*[:：][^，。；]*[，。；]?/gi, '').trim();
            const sentence = clean.split(/[。！？]/).map(function (part) { return String(part || '').trim(); }).filter(Boolean)[0] || clean;
            clean = sentence.replace(/^["']|["']$/g, '').trim();
            clean = clean.replace(/^(评论|回复|comment|reply)\s*[:：]\s*/i, '').trim();
            clean = clean.replace(/[，,；;、]+$/g, '').trim();
            if (clean.length > 34) clean = clean.slice(0, 34).replace(/[，,；;、]+$/g, '').trim();
            if (/^(思考|分析|状态|我需要|让我|先看)/.test(clean)) return '';
            if (clean.length < 8) return '';
            return clean;
        }

        function collectMemoryHighlights() {
            const roleId = ensureSessionRoleId(false);
            const history = readChatHistory(roleId);
            const hints = [];
            for (let i = Math.max(0, history.length - 24); i < history.length; i++) {
                const msg = history[i];
                if (!msg || typeof msg !== 'object') continue;
                const content = String(msg.content || '').replace(/\s+/g, ' ').trim();
                if (!content) continue;
                const normalized = content
                    .replace(/^(我|TA|你|他|她)\s*[:：]\s*/g, '')
                    .replace(/[“”"'`]/g, '')
                    .trim();
                if (!normalized) continue;
                if (normalized.length >= 4 && normalized.length <= 18 && !/[\[\]{}<>]/.test(normalized)) {
                    hints.push(normalized);
                }
            }
            return hints.slice(-6);
        }

        function isAllowedAlbumScreenshotDescription(text) {
            const clean = String(text || '').replace(/\s+/g, ' ').trim();
            if (!clean) return false;
            const screenshotMarkers = /截图|截屏|屏幕|界面|锁屏|壁纸|聊天记录截图|通知栏|播放界面|聊天界面|相册界面/;
            if (!screenshotMarkers.test(clean)) return false;
            if (/原文|对话如下|短期记忆|提示词|system prompt|user prompt/i.test(clean)) return false;
            return true;
        }

        function isBadPhotoDescription(text) {
            const clean = String(text || '').replace(/\s+/g, ' ').trim();
            if (!clean) return true;
            if (clean.length < 10) return true;
            if (isAllowedAlbumScreenshotDescription(clean)) return false;
            if (/^(我|TA)\s*[:：]/.test(clean)) return true;
            if (/^(思考|分析|状态|输出|照片\d|第\d张)/.test(clean)) return true;
            if (/^(早安|晚安|宝宝|哈哈|好的|收到)$/.test(clean)) return true;
            if (/[：:]/.test(clean) && /(我|TA|你|他说|她说)/.test(clean)) return true;
            if (/原文|对话如下|短期记忆/.test(clean)) return true;
            if (/聊天记录/.test(clean)) return true;
            return false;
        }

        function normalizePhotoDescription(text) {
            let clean = parseAiText(text);
            clean = clean.replace(/^[-*•\d\.\)\s]+/, '').trim();
            clean = clean.replace(/^(照片|图|画面)\s*\d*\s*[:：]\s*/i, '').trim();
            clean = clean.replace(/^["']|["']$/g, '').trim();
            clean = clean.replace(/\s+/g, ' ').trim();
            if (isBadPhotoDescription(clean)) return '';
            return clean;
        }

        function extractPhotoDescriptions(text) {
            const arr = extractJsonArray(text);
            if (arr && arr.length) return arr;
            const raw = String(text || '').trim();
            if (!raw) return [];
            const fenced = raw.match(/```(?:json)?\s*([\s\S]*?)```/i);
            const candidate = fenced && fenced[1] ? String(fenced[1]).trim() : raw;
            return candidate
                .replace(/<think[\s\S]*?<\/think>/gi, ' ')
                .replace(/<thinking[\s\S]*?<\/thinking>/gi, ' ')
                .split(/\r?\n+/)
                .map(function (line) { return String(line || '').trim(); })
                .map(function (line) { return line.replace(/^[-*•\d\.\)\s]+/, '').trim(); })
                .filter(function (line) {
                    return line && !/^(说明|备注|分析|思考|输出|json|数组)\s*[:：]?/i.test(line);
                });
        }

        function logAlbumPromptDebug(debugTag, systemPrompt, userPrompt, imageBase64) {
            const tag = String(debugTag || '恋爱相册调用').trim() || '恋爱相册调用';
            const systemText = String(systemPrompt || '');
            const userText = String(userPrompt || '');
            const hasImage = !!imageBase64;
            const payload = {
                page: 'couple-album',
                tag: tag,
                timestamp: Date.now(),
                systemPrompt: systemText,
                userPrompt: userText,
                hasImage: hasImage,
                imageLength: hasImage ? String(imageBase64).length : 0
            };
            try {
                window.__couplePromptDebugHistory = Array.isArray(window.__couplePromptDebugHistory) ? window.__couplePromptDebugHistory : [];
                window.__couplePromptDebugHistory.unshift(payload);
                window.__couplePromptDebugHistory = window.__couplePromptDebugHistory.slice(0, 30);
                window.__lastCoupleAlbumPromptDebug = payload;
            } catch (e) {}
            try {
                console.group(`[AI Prompt][恋爱相册] ${tag}`);
                console.log('=== SYSTEM PROMPT START ===\n' + systemText + '\n=== SYSTEM PROMPT END ===');
                console.log('=== USER PROMPT START ===\n' + userText + '\n=== USER PROMPT END ===');
                console.log('=== PAYLOAD META ===', {
                    hasImage: hasImage,
                    imageLength: payload.imageLength
                });
                console.groupEnd();
            } catch (e2) {
                console.log('[AI Prompt][恋爱相册][' + tag + ']', payload);
            }
        }

        function logAlbumResponseDebug(debugTag, rawText, extra) {
            const tag = String(debugTag || '恋爱相册返回').trim() || '恋爱相册返回';
            const text = String(rawText || '');
            const payload = {
                page: 'couple-album',
                tag: tag,
                timestamp: Date.now(),
                rawText: text,
                extra: extra && typeof extra === 'object' ? extra : {}
            };
            try {
                window.__lastCoupleAlbumResponseDebug = payload;
                window.__couplePromptDebugHistory = Array.isArray(window.__couplePromptDebugHistory) ? window.__couplePromptDebugHistory : [];
                window.__couplePromptDebugHistory.unshift(payload);
                window.__couplePromptDebugHistory = window.__couplePromptDebugHistory.slice(0, 30);
            } catch (e) {}
            try {
                console.group(`[AI Response][恋爱相册] ${tag}`);
                console.log('=== RAW RESPONSE START ===\n' + text + '\n=== RAW RESPONSE END ===');
                if (payload.extra && Object.keys(payload.extra).length) {
                    console.log('=== RESPONSE META ===', payload.extra);
                }
                console.groupEnd();
            } catch (e2) {
                console.log('[AI Response][恋爱相册][' + tag + ']', payload);
            }
        }

        function getTheirCardLabel(item) {
            const text = String((item && item.text) || '').replace(/\s+/g, ' ').trim();
            if (!text) return '甜蜜片段';
            return text.length > 22 ? text.slice(0, 22) + '…' : text;
        }

        async function askAi(systemPrompt, text, imageBase64, debugTag) {
            const callAI = resolveCallAI();
            if (!callAI) throw new Error('AI 接口未初始化');
            return new Promise((resolve, reject) => {
                try {
                    logAlbumPromptDebug(debugTag, systemPrompt, text, imageBase64);
                    const payload = imageBase64
                        ? { type: 'image', base64: imageBase64, text }
                        : { text };
                    callAI(
                        systemPrompt,
                        [],
                        payload,
                        (reply) => resolve(String(reply || '')),
                        (err) => reject(new Error(String(err && err.message ? err.message : err || '请求失败')))
                    );
                } catch (e) {
                    reject(e);
                }
            });
        }

        function fallbackTheirsDescriptions(memoryText) {
            const hints = collectMemoryHighlights();
            const hint0 = hints[0] || '晚点回家';
            const hint1 = hints[1] || '想你';
            return [
                '我偷偷拍下你趴在桌边发呆的侧脸，窗边的光刚好落进睫毛里',
                '你低头看手机时我按下快门，外套袖口和散开的头发一起入镜',
                `聊天截图停在“${hint0.slice(0, 12)}”那句，时间显示在深夜`,
                `我把你的照片设成锁屏，壁纸角落还留着“${hint1.slice(0, 8)}”的通知`
            ];
        }

        async function generateTheirsCardsByApi() {
            const shortMemory = buildShortTermMemory();
            const prompts = buildAlbumGalleryPrompts(shortMemory);
            let descriptions = [];
            try {
                descriptions = await requestAlbumGalleryDescriptions(prompts);
            } catch (err) {
                console.error('generateTheirsCardsByApi first attempt failed:', err);
                const shouldRetry = window.confirm(
                    buildAlbumFailureMessage(
                        '生成对方相册失败',
                        err,
                        '已过滤掉聊天里的【内心独白】和 API 错误消息，但这次仍未拿到可用结果。是否立即重试一次？'
                    )
                );
                if (!shouldRetry) return;
                try {
                    descriptions = await retryAlbumGalleryDescriptions(prompts);
                } catch (retryErr) {
                    console.error('generateTheirsCardsByApi retry failed:', retryErr);
                    window.alert(buildAlbumFailureMessage('重试生成对方相册仍然失败', retryErr));
                    return;
                }
            }
            const now = Date.now();
            for (let i = 0; i < 4; i++) {
                const text = descriptions[i];
                if (!text) continue;
                state.theirCards.unshift({
                    id: `theirs_${now}_${i}_${Math.random().toString(36).slice(2, 8)}`,
                    text,
                    brief: getTheirCardLabel({ text }),
                    date: formatDate(now),
                    createdAt: now + i,
                });
            }
            renderTheirs();
            await saveState();
        }

        function stopModalTyping() {
            if (modalTypingTimer) {
                clearInterval(modalTypingTimer);
                modalTypingTimer = null;
            }
            modalText.classList.remove('typing');
        }

        function showTypewriterModal(text) {
            const content = String(text || '').trim();
            if (!content) return;
            stopModalTyping();
            modalText.textContent = '';
            modal.classList.add('show');
            modalText.classList.add('typing');
            let index = 0;
            const delay = content.length > 40 ? 22 : 30;
            modalTypingTimer = setInterval(() => {
                index += 1;
                modalText.textContent = content.slice(0, index);
                if (index >= content.length) {
                    stopModalTyping();
                    modalText.textContent = content;
                }
            }, delay);
        }

        function closeModal() {
            stopModalTyping();
            modal.classList.remove('show');
            setTimeout(() => {
                if (modal.classList.contains('show')) return;
                modalText.textContent = '';
            }, 220);
        }

        function openDetailById(id) {
            const target = state.minePhotos.find((item) => String(item.id) === String(id));
            if (!target) return;
            currentDetailId = id;
            detailImageEl.src = target.src;
            detailDateEl.textContent = target.date;
            
            if (target.mood) {
                detailMoodEl.textContent = `“${target.mood}”`;
                detailMoodEl.style.display = 'block';
            } else {
                detailMoodEl.style.display = 'none';
            }

            const roleName = getAlbumRoleName();
            detailCommentEl.textContent = String(target.comment || '').trim() || `${roleName}还没写下这张照片的评论，点击下方按钮可以让${roleName}来评论。`;
            refreshAlbumRoleUiTexts();
            detailOverlay.classList.add('show');
        }

        function closeDetail() {
            detailOverlay.classList.remove('show');
            currentDetailId = null;
        }

        async function handleGenerateFlow() {
            if (fabBtn.classList.contains('loading')) return;
            fabBtn.classList.add('loading');
            try {
                await generateTheirsCardsByApi();
            } finally {
                fabBtn.classList.remove('loading');
            }
        }

        tabs.forEach((tab) => {
            tab.addEventListener('click', () => {
                tabs.forEach((t) => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.getAttribute('data-target');
                if (currentTab === 'view-mine') {
                    mineView.classList.add('active');
                    theirsView.classList.remove('active');
                } else {
                    theirsView.classList.add('active');
                    mineView.classList.remove('active');
                }
                updateIndicator(tab);
                setFabByTab();
            });
        });

        fabBtn.addEventListener('click', () => {
            if (currentTab === 'view-mine') {
                uploadInput.click();
            } else {
                handleGenerateFlow();
            }
        });

        uploadInput.addEventListener('change', async (e) => {
            await handleMineUpload(e.target.files);
            uploadInput.value = '';
        });

        bindLongPress(mineView, 'data-photo-id');
        bindLongPress(theirsView, 'data-theirs-id');

        mineView.addEventListener('click', (e) => {
            if (selectionMode) return;
            const card = e.target.closest('[data-photo-id]');
            if (!card) return;
            openDetailById(card.getAttribute('data-photo-id'));
        });

        theirsView.addEventListener('click', (e) => {
            if (selectionMode) return;
            const card = e.target.closest('[data-theirs-id]');
            if (!card) return;
            const id = card.getAttribute('data-theirs-id');
            const target = state.theirCards.find((item) => String(item.id) === String(id));
            if (!target) return;
            showTypewriterModal(target.text);
        });

        selectionSelectAllBtn.addEventListener('click', selectAllCurrentTab);
        selectionDeleteBtn.addEventListener('click', () => {
            deleteSelectedItems();
        });
        selectionCancelBtn.addEventListener('click', exitSelectionMode);

        modal.addEventListener('click', closeModal);
        detailCloseBtn.addEventListener('click', closeDetail);
        detailOverlay.addEventListener('click', (e) => {
            if (e.target === detailOverlay) closeDetail();
        });

        detailAiBtn.addEventListener('click', async () => {
            if (!currentDetailId) return;
            const target = state.minePhotos.find((item) => String(item.id) === String(currentDetailId));
            if (!target) return;
            
            if (detailAiBtn.classList.contains('loading')) return;
            
            const originalText = detailAiBtn.textContent;
            detailAiBtn.textContent = `✨ ${getAlbumRoleName()}正在写评论...`;
            detailAiBtn.classList.add('loading');
            
            try {
                const prompts = buildAlbumCommentPrompts(target);
                let newComment = '';
                try {
                    newComment = await requestAlbumCommentText(prompts, target, false);
                } catch (err) {
                    console.error('album comment first attempt failed:', err);
                    const shouldRetry = window.confirm(
                        buildAlbumFailureMessage('照片评论生成失败', err, '是否立即重试一次？')
                    );
                    if (!shouldRetry) return;
                    try {
                        newComment = await requestAlbumCommentText(prompts, target, true);
                    } catch (retryErr) {
                        console.error('album comment retry failed:', retryErr);
                        window.alert(buildAlbumFailureMessage('重试照片评论仍然失败', retryErr));
                        return;
                    }
                }
                
                target.comment = newComment;
                detailCommentEl.textContent = newComment;
                
                renderMine();
                await saveState();
            } finally {
                detailAiBtn.textContent = originalText;
                detailAiBtn.classList.remove('loading');
            }
        });

        async function initPage() {
            ensureSessionRoleId(true);
            const loaded = await readState();
            state.minePhotos = Array.isArray(loaded.minePhotos) ? loaded.minePhotos : [];
            state.theirCards = Array.isArray(loaded.theirCards) ? loaded.theirCards : [];
            mineView.classList.add('active');
            updateIndicator(document.querySelector('.tab.active'));
            setFabByTab();
            refreshAlbumRoleUiTexts();
            renderMine();
            renderTheirs();
            updateSelectionUi();
        }

        initPage();
    </script>
</body>
